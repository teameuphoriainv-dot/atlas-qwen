name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests (incl. PHI-isolation boundary, sentinel rules, audit chain)
        run: npx vitest run
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
